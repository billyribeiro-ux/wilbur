name: React App

on:
  push:
    branches: [main]
    paths:
      - "react-app/**"
      - ".github/workflows/react.yml"
  pull_request:
    branches: [main]
    paths:
      - "react-app/**"
      - ".github/workflows/react.yml"

concurrency:
  group: react-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: "24.14.1"
  PNPM_VERSION: "10.28.0"

defaults:
  run:
    working-directory: react-app

jobs:
  frontend:
    name: React (PE7 + lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: react-app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: App isolation (React must not import svelte-app)
        run: pnpm run check:isolation

      - name: PE7 gates (src/)
        run: pnpm run check:pe7

      - name: ESLint (src/ only, zero warnings)
        run: pnpm exec eslint src --ext .ts,.tsx,.js,.mjs --max-warnings 0

      - name: Build
        run: pnpm run build
