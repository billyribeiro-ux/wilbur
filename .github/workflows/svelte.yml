name: Svelte App

on:
  push:
    branches: [main]
    paths:
      - "svelte-app/**"
      - ".github/workflows/svelte.yml"
  pull_request:
    branches: [main]
    paths:
      - "svelte-app/**"
      - ".github/workflows/svelte.yml"

concurrency:
  group: svelte-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: "24.14.1"
  PNPM_VERSION: "11.6.0"

defaults:
  run:
    working-directory: svelte-app

jobs:
  frontend:
    name: SvelteKit (PE7 + lint + check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: svelte-app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: PE7 gates (svelte-app/)
        run: pnpm run check:pe7

      - name: ESLint
        run: pnpm run lint

      - name: svelte-check
        run: pnpm run check
        env:
          PUBLIC_POCKETBASE_URL: http://127.0.0.1:8090
