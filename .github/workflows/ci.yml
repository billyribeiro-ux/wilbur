name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.82"
  NODE_VERSION: "24.14.1"
  PNPM_VERSION: "10.28.0"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wilbur-api
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wilbur-api/target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('wilbur-api/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings
        env:
          SQLX_OFFLINE: "true"

  frontend:
    name: Frontend (PE7 + lint + Svelte check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: App isolation (React must not import svelte-app)
        run: pnpm run check:isolation

      - name: PE7 gates (React src/)
        run: pnpm run check:pe7

      - name: PE7 gates (SvelteKit svelte-app/)
        run: pnpm run check:pe7:svelte

      - name: ESLint (React app — src/ only, zero warnings)
        run: pnpm exec eslint src --ext .ts,.tsx,.js,.mjs --max-warnings 0

      - name: ESLint (SvelteKit)
        run: pnpm --dir svelte-app run lint

      - name: svelte-check
        run: pnpm --dir svelte-app run check
        env:
          PUBLIC_POCKETBASE_URL: http://127.0.0.1:8090

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wilbur-api
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: wilbur
          POSTGRES_PASSWORD: wilbur
          POSTGRES_DB: wilbur_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wilbur"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://wilbur:wilbur@localhost:5432/wilbur_test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wilbur-api/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('wilbur-api/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Run database migrations
        run: sqlx migrate run --source migrations

      - name: Run tests
        run: cargo test
        env:
          JWT_SECRET: test-secret-key-for-ci-only-not-production
          SQLX_OFFLINE: "true"

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wilbur-api
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wilbur-api/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('wilbur-api/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Build release binary
        run: cargo build --release
        env:
          SQLX_OFFLINE: "true"
